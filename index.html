<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MEME SMASH</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="frame">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="ui">
      <button id="helpBtn">? CONTROLS</button>
      <button id="fsBtn">⛶ FULLSCREEN</button>
    </div>
    <div id="controls" class="hidden">
      <h3>Controls</h3>
      <table>
        <tr><th>Action</th><th>P1</th><th>P2</th></tr>
        <tr><td>Move / Jump</td><td>Arrows</td><td>WASD</td></tr>
        <tr><td>Drop / Fastfall</td><td>↓</td><td>S</td></tr>
        <tr><td>Light Attack</td><td>X</td><td>J</td></tr>
        <tr><td>Smash (Heavy)</td><td>C</td><td>K</td></tr>
        <tr><td>Special</td><td>Z</td><td>L</td></tr>
        <tr><td>Shield</td><td>V</td><td>I</td></tr>
      </table>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
